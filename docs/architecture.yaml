# Civitas Twin M1.2 Pro v7 — System Architecture
# This file is the single source of truth for the system's structure.
# Last updated: 2026-02-14

project:
  name: Civitas Twin M1.2 Professional Edition v7
  description: >
    5,000件のシードペルソナDNAと5つの行動心理理論を統合し、
    100万人規模の社会反応を精密にシミュレートする高度社会推論エンジン。
    リアルタイムの外部情勢をGrounding検索で取り込み、
    監査品質の戦略レポートを生成する。
  version: "1.3.1"
  repository: https://github.com/KIRIKO-HirokiSato/civitas-twin
  last_major_update: "2026-02-14 (チャットインタフェース修正完了、リビジョン civitas-twin-00023-wpk)"

# ---------------------------------------------------------------------------
# GCP
# ---------------------------------------------------------------------------
gcp:
  project_id: gen-lang-client-0491126700
  project_number: "902796884296"
  region: asia-northeast1
  account: h.sato@kiriko.tech
  local_config:
    tool: direnv
    config_name: kiriko-civitas
    envrc: export CLOUDSDK_ACTIVE_CONFIG_NAME=kiriko-civitas

# ---------------------------------------------------------------------------
# Components
# ---------------------------------------------------------------------------
components:

  # ----- Frontend SPA (Client-Side) -----
  frontend:
    type: single-page-application
    runtime: browser
    framework: React 19.2
    language: TypeScript 5.8
    build_tool: Vite 6.2
    build_target: ES2022
    entry_point: index.tsx
    output_dir: dist/

    modules:
      app:
        file: App.tsx
        responsibility: >
          UIレイアウト、シミュレーション実行フロー、履歴管理、
          Deep Diveインタビューチャット、PDFエクスポート

      gemini_service:
        file: geminiService.ts
        responsibility: >
          バックエンドAPI (/api/generate, /api/chat/send) 呼び出しのラッパー。
          シミュレーション推論 (runSimulation) と
          ペルソナ対話セッション (startInterviewSession) を提供。
          Gemini APIは直接呼ばず、Expressバックエンド経由でアクセス。
        exports:
          - name: runSimulation
            description: バックエンド /api/generate を呼び出し、社会反応レポートを生成
          - name: startInterviewSession
            description: バックエンド /api/chat/send 経由で特定セグメントのペルソナとチャットセッションを開始

      persona_data:
        file: personaData.ts
        responsibility: >
          5,000件のシードペルソナDNA定義とアーキタイプ分布。
          100万人への暫定投影ロジックを含む。
        data:
          seed_n: 5000
          population_n: 1_000_000
          data_version: "1.3"
          validated_date: "2025-12-22"
          source: Persona(JPN)-5000.csv
          archetype_dimensions:
            - Schwartz value theory
            - TPB (Theory of Planned Behavior)
            - Prospect Theory
            - ELM (Elaboration Likelihood Model)
            - Zaller RAS model

      types:
        file: types.ts
        responsibility: TypeScript型定義 (SimulationParams, SimulationResult, ChatMessage, HistoryItem)

    ui_dependencies:
      - name: react-markdown
        version: "^10.1.0"
        purpose: レポートのMarkdownレンダリング
      - name: remark-gfm
        version: "^4.0.0"
        purpose: GitHub Flavored Markdown (テーブル等)
      - name: rehype-raw
        version: "^7.0.0"
        purpose: Markdown内HTMLのパース
      - name: tailwindcss
        source: CDN (cdn.tailwindcss.com)
        purpose: ユーティリティファーストCSS
      - name: html2pdf.js
        version: "0.10.1"
        source: CDN (cdnjs.cloudflare.com)
        purpose: レポートのPDFエクスポート
      - name: Plus Jakarta Sans
        source: Google Fonts
        purpose: UIフォント

  # ----- Backend API (Express) -----
  backend:
    type: api-server
    runtime: Node.js 22
    framework: Express 5.2
    language: JavaScript (ES Modules)
    entry_point: server/index.js
    port: 8080

    endpoints:
      - path: /api/generate
        method: POST
        purpose: Gemini APIプロキシ - シミュレーション推論
        authentication: なし（レート制限あり）
        request_body:
          systemInstruction: string
          contents: array
          generationConfig: object
        response:
          text: string
          groundingUrls: array

      - path: /api/chat/send
        method: POST
        purpose: Gemini APIプロキシ - チャットメッセージ送信
        authentication: なし（レート制限あり）
        request_body:
          systemInstruction: string
          history: array
          message: string
        response:
          text: string
          role: string

      - path: /api/chat/start
        method: POST
        purpose: チャットセッション初期化（現在未使用）
        authentication: なし

    security:
      cors:
        enabled: true
        allowed_origins:
          - https://civitas-twin-902796884296.asia-northeast1.run.app
          - http://localhost:3000 (開発時のみ)
          - http://localhost:8080 (開発時のみ)
        allowed_methods: [GET, POST]

      rate_limiting:
        enabled: true
        library: express-rate-limit 8.2
        window: 15分
        max_requests: 50
        endpoints: /api/*
        headers: RateLimit-* (標準ヘッダー)

      payload_limit: 1MB

      error_handling:
        production: 汎用エラーメッセージのみ返却（details非表示）
        development: error.message を含む詳細エラーを返却

    dependencies:
      - name: express
        version: "^5.2.1"
      - name: cors
        version: "^2.8.6"
      - name: express-rate-limit
        version: "^8.2.1"
      - name: dotenv
        version: "^17.3.1"
      - name: "@google/genai"
        version: "^1.41.0"
        purpose: Vertex AI + Gemini 3 Pro Preview 呼び出し

  # ----- Cloud Run (Serving) -----
  cloud_run:
    service_name: civitas-twin
    url: https://civitas-twin-902796884296.asia-northeast1.run.app
    region: asia-northeast1
    port: 8080
    authentication: none (invoker IAM check disabled)
    current_revision: civitas-twin-00023-wpk
    container:
      base_image: node:22-slim
      server: Express (server/index.js)
      static_files: Viteビルド済み (dist/) を Express.static で配信
      spa_fallback: すべてのルート → index.html (app.use)
    environment_variables:
      - name: NODE_ENV
        value: production
        purpose: エラーメッセージ制御、CORS設定
      - name: PORT
        value: 8080 (デフォルト)
    authentication:
      method: Application Default Credentials (ADC)
      note: Cloud Run サービスアカウントが Vertex AI へのアクセス権を持つ
    scaling:
      min_instances: 0  # scale to zero
      max_instances: default

  # ----- Gemini API (AI) -----
  gemini_api:
    provider: Google Cloud Vertex AI
    model: gemini-3-pro-preview
    sdk: "@google/genai ^1.41.0"
    invocation: server-side (frontend → Express backend → Vertex AI Gemini API via @google/genai)
    authentication: Application Default Credentials (ADC)
    security: ADC によるサーバーサイド認証、クライアントには非露出
    features:
      - name: ai.models.generateContent
        purpose: 社会反応シミュレーション推論
        endpoint: /api/generate (Expressプロキシ)
        config:
          temperature: 0.1
          tools: [googleSearch]
      - name: ai.chats.create
        purpose: Deep Diveインタビューセッション
        endpoint: /api/chat/send (Expressプロキシ)
        config:
          temperature: 0.7
          tools: []
    grounding:
      tool: Google Search
      purpose: リアルタイムの外部情勢（6観点）取得と出典URL付与

# ---------------------------------------------------------------------------
# Data Flow
# ---------------------------------------------------------------------------
data_flows:

  simulation:
    description: ユーザーがニュース/施策を入力 → 社会反応レポート生成
    steps:
      - from: user
        to: frontend
        data: newsText, purpose, region
      - from: frontend
        to: backend (Express)
        endpoint: POST /api/generate
        data: systemInstruction, contents, generationConfig
        protocol: HTTPS (fetch API)
      - from: backend
        to: gemini_api
        data: プロンプト (ペルソナDNA + 心理理論 + 入力テキスト)
        protocol: Gemini API SDK
        auth: API Key (環境変数)
      - from: gemini_api
        to: google_search
        data: 外部情勢の検索クエリ
        note: Grounding toolとして自動実行
      - from: gemini_api
        to: backend
        data: レポートMarkdown + groundingChunks
      - from: backend
        to: frontend
        data: { text, groundingUrls }
      - from: frontend
        to: user
        data: レンダリング済みレポート (HTML/PDF)

  deep_dive_interview:
    description: レポート生成後、特定セグメントのペルソナとリアルタイム対話
    steps:
      - from: user
        to: frontend
        data: セグメント選択 (High/Mid/Low) + 質問テキスト
      - from: frontend
        to: backend (Express)
        endpoint: POST /api/chat/send
        data: systemInstruction, history, message
      - from: backend
        to: gemini_api
        data: チャットメッセージ (ai.chats.create 経由)
        note: 履歴はフロントエンド側で管理され、各リクエストに含まれる
      - from: gemini_api
        to: backend
        data: ペルソナとしての応答テキスト
      - from: backend
        to: frontend
        data: { text, role }
      - from: frontend
        to: user
        data: チャットUI上の応答表示

# ---------------------------------------------------------------------------
# Build & Deploy Pipeline
# ---------------------------------------------------------------------------
build_pipeline:

  local_development:
    command: npm run dev
    port: 3000
    host: 0.0.0.0
    env_file: .env.local

  production_build:
    command: npm run build
    output: dist/
    note: >
      APIキーはビルド時に埋め込まれない（v1.2.1以降）。
      バックエンドが Application Default Credentials (ADC) で認証（v1.3.0以降）。

  container:
    dockerfile: Dockerfile
    stages:
      - name: build
        base: node:22-slim
        steps: [npm ci, npm run build]
      - name: production
        base: node:22-slim
        steps:
          - npm ci --production (本番依存関係のみ)
          - COPY dist/ (ビルド済み静的ファイル)
          - COPY server/ (Express サーバー)
        cmd: node server/index.js

  cloud_deploy:
    command: >
      export CLOUDSDK_ACTIVE_CONFIG_NAME=kiriko-civitas &&
      gcloud run deploy civitas-twin
      --source .
      --region=asia-northeast1
      --allow-unauthenticated
      --port=8080
      --project=gen-lang-client-0491126700
      --set-env-vars="NODE_ENV=production"
    post_deploy: >
      export CLOUDSDK_ACTIVE_CONFIG_NAME=kiriko-civitas &&
      gcloud run services update civitas-twin
      --region=asia-northeast1
      --project=gen-lang-client-0491126700
      --no-invoker-iam-check
    note: >
      NODE_ENV=production によりエラーメッセージ詳細が非表示になる。
      認証は Application Default Credentials (ADC) を使用（v1.3.0以降）。
    services_required:
      - run.googleapis.com
      - cloudbuild.googleapis.com
      - artifactregistry.googleapis.com
    build_service: Cloud Build
    image_registry: Artifact Registry (asia-northeast1-docker.pkg.dev)

# ---------------------------------------------------------------------------
# GCP IAM & Enabled APIs
# ---------------------------------------------------------------------------
gcp_setup:
  description: >
    初回セットアップ時に実施済み。再セットアップが必要な場合はここを参照。

  enabled_apis:
    - run.googleapis.com
    - cloudbuild.googleapis.com
    - artifactregistry.googleapis.com

  iam_bindings:
    # Cloud Build のデフォルトSAに付与済みのロール
    service_account: 902796884296-compute@developer.gserviceaccount.com
    roles:
      - role: roles/storage.admin
        reason: Cloud Build がソースを Cloud Storage に読み書きするため
      - role: roles/artifactregistry.writer
        reason: ビルドしたDockerイメージを Artifact Registry にプッシュするため
      - role: roles/logging.logWriter
        reason: Cloud Build のビルドログを Cloud Logging に出力するため

  org_policy_constraints:
    - constraint: iam.allowedPolicyMemberDomains
      impact: >
        allUsers / allAuthenticatedUsers の IAMバインディングがブロックされる。
        Cloud Run を公開するには --no-invoker-iam-check を使用する必要がある。

# ---------------------------------------------------------------------------
# Security Notes
# ---------------------------------------------------------------------------
security:
  api_key_protection: >
    ✅ v1.3.0 で @google/genai + ADC に移行完了。
    Vertex AI を使用し、Application Default Credentials で認証。
    APIキーは不要となり、クライアントへの露出リスクが完全に解消された。

  backend_security:
    cors:
      status: ✅ 実装済み
      description: >
        本番URL (https://civitas-twin-902796884296.asia-northeast1.run.app) のみ許可。
        開発時は localhost:3000/8080 も許可（NODE_ENV !== 'production' 時）。

    rate_limiting:
      status: ✅ 実装済み
      description: >
        /api/* エンドポイントに15分あたり50リクエストの制限。
        DDoS攻撃・API枯渇攻撃対策。

    error_handling:
      status: ✅ 実装済み
      description: >
        本番環境（NODE_ENV=production）では error.message を返さず、
        汎用エラーメッセージのみ返却。内部構成の漏洩を防止。

    payload_limit:
      status: ✅ 実装済み
      description: JSONペイロードを1MBに制限（不要に大きいリクエストを拒否）

  authentication:
    status: ⚠️ 未実装
    description: >
      APIエンドポイントに認証なし（レート制限のみ）。
      本番運用時は Firebase Authentication 等の導入を推奨。

  cloud_run_auth: >
    組織ポリシー (iam.allowedPolicyMemberDomains) により allUsers IAMバインディング
    不可のため、--no-invoker-iam-check で公開。

  secrets_in_repo: >
    .env.local は .gitignore 対象。
    Cloud Run デプロイ時は Application Default Credentials (ADC) で認証（v1.3.0以降）。
    APIキーの管理は不要。

